services:
  prometheus:
    image: prom/prometheus:latest
    container_name: moduply-k6-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    volumes:
      - ./k6/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: moduply-k6-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana

  k6:
    image: grafana/k6:latest
    container_name: moduply-k6
    ports:
      - "5665:5665"
    depends_on:
      - prometheus
    volumes:
      - ./k6:/scripts
    environment:
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_TREND_STATS: "avg,min,med,p(90),p(95),max"

      K6_WEB_DASHBOARD: "true"
      K6_WEB_DASHBOARD_HOST: "0.0.0.0"
      K6_WEB_DASHBOARD_PORT: "5665"
      K6_WEB_DASHBOARD_PERIOD: "1s"
      K6_WEB_DASHBOARD_EXPORT: ${K6_WEB_DASHBOARD_EXPORT:-/scripts/reports/k6-report.html}

volumes:
  prometheus-data:
  grafana-data:
