# CD 워크플로우 이름
name: CD

# 트리거 조건: main 브랜치에 코드가 푸시될 때 실행
on:
  push:
    branches: [ main ]
    # 문서/노트 변경만으로는 Docker 이미지 빌드와 ECS 배포를 실행하지 않는다.
    # 애플리케이션 코드, 설정, Dockerfile, Gradle 파일이 바뀐 경우에만 배포 비용을 사용한다.
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - 'notes/**'
      - '.gitignore'

concurrency:
  group: cd-${{ github.ref }} # 같은 브랜치의 중복 배포만
  # 같은 group에 이미 실행 중인 워크플로우가 있을 때
  # 진행 중인 작업은 끝까지 수행하고, 새 작업은 대기열에 추가
  cancel-in-progress: false # 순차 처리

# 이 워크플로우가 리포지토리 소스코드를 읽기만 할 수 있도록 제한
permissions:
  contents: read # 읽기만 가능

jobs:
  # Docker 이미지 빌드 & Private ECR 푸시
  # main 브랜치에는 PR + CI required check를 통과한 코드만 merge된다는 전제로,
  # CD에서는 테스트를 다시 수행하지 않고 배포 이미지 생성과 ECS 반영만 담당한다.
  build-and-push:
    name: Build & Push to Private ECR
    runs-on: ubuntu-latest

    # 다음 Job(deploy)에 이미지 URI를 전달하기 위한 출력
    outputs:
      image-uri: ${{ steps.image.outputs.uri }}

    steps:
      # 1) 소스코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4 # 현재 repo의 소스코드를 Runner 작업 디렉터리로 복사

      # 2) AWS 자격 증명 설정
      - name: Configure AWS credentials (Private ECR)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # 3) Private ECR 로그인
      - name: Login to Amazon Private ECR
        id: login-ecr
        # ECR 레지스트리에 Docker 클라이언트를 로그인
        uses: aws-actions/amazon-ecr-login@v2

      # 4) Docker 이미지 빌드 & 푸시
      # - 멀티 플랫폼 옵션 사용 X (Runner와 ECS 모두 x86_64이므로 불필요)
      # - 태그: latest + GitHub 커밋 해시(github.sha)
      - name: Build & push Docker image
        id: image
        env:
          ECR_URI: ${{ vars.ECR_REPOSITORY_URI }}
          SHA: ${{ github.sha }} # 커밋 해시
        run: |
          docker build \
            -t "$ECR_URI:latest" \
            -t "$ECR_URI:$SHA" \
            .
          docker push "$ECR_URI:latest"
          docker push "$ECR_URI:$SHA"
          echo "uri=$ECR_URI:$SHA" >> "$GITHUB_OUTPUT"
        # 다음 Job에서 사용할 수 있도록 SHA 태그가 붙은 URI를 출력

  # ECS 서비스 업데이트 (배포)
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push   # 해당 job이 끝나야 배포 시작

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) AWS 자격 증명 설정 (ECS용)
      - name: Configure AWS credentials (ECS)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # 2) 기존 태스크 정의 다운로드
      # describe-task-definition 결과에는 register-task-definition이 거부하는
      # read-only 필드들이 포함되어 있으므로 jq로 제거
      - name: Download current task definition
        # --query taskDefinition: API 응답에서 taskDefinition 객체만 추출
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            | jq 'del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy,
              .deregisteredAt
            )' > task-definition.json

      # 3) 현재 서비스가 사용 중인 태스크 정의 ARN 저장
      # 단일 t3.small 배포에서는 기존 서비스를 먼저 내리고 새 태스크를 올리므로,
      # 새 배포가 실패하면 이 ARN으로 즉시 롤백해야 한다.
      - name: Capture current service task definition
        id: current-service
        run: |
          CURRENT_TD_ARN=$(aws ecs describe-services \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }} \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "task-definition=$CURRENT_TD_ARN" >> "$GITHUB_OUTPUT"

      # 4) 새 이미지 URI를 태스크 정의에 주입
      # amazon-ecs-render-task-definition
      #  - task-definition.json 안에서 container-name이 "moduply-app"인
      #    컨테이너 정의를 찾아서 image 필드를 새 URI로 교체
      #    수정된 JSON 파일의 경로를 outputs.task-definition으로 출력
      - name: Render new image into task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: moduply-app
          image: ${{ needs.build-and-push.outputs.image-uri }}

      # 5) 새 태스크 정의를 AWS에 등록
      - name: Register new task definition revision
        id: register
        # register-task-definition
        #  - 수정된 JSON을 AWS에 업로드하여 새 리비전(버전)을 생성
        # --cli-input-json file://${{ steps.render.outputs.task-definition }}
        #  - 랜더링된 테스크 정의 파일을 입력으로 전달
        # --query 'taskDefinition.taskDefinitionArn'
        #  - 등록된 새 리비전의 ARN만 추출
        # echo "arn=$NEW_TD_ARN" >> "$GITHUB_OUTPUT"
        #  - 다음 스텝에서 이 ARN을 참조하기 위해 출력
        run: |
          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://${{ steps.render.outputs.task-definition }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "arn=$NEW_TD_ARN" >> "$GITHUB_OUTPUT"

      # 6) 기존에 구동 중인 서비스 중단 (프리티어 리소스 확보)
      # 기존 컨테이너를 먼저 내린 후 새 컨테이너를 올리는 전략
      - name: Stop running service (free tier capacity)
        # desired-count=0
        #  - 실행 중인 테스크 수를 0으로 만든다.
        #  - ECS가 실행 중인 컨테이너를 graceful shutdown한다.
        # aws ecs wait services-stable
        #  - 서비스가 안정 상태(desired=running=0)가 될 때까지 폴링하며 대기
        #  - 컨테이너가 완전히 종료된 것을 보장한 후 다음 단계 진행
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --desired-count 0
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }}

      # 7) 새 태스크 정의로 ECS 서비스 업데이트 + 재시작
      # desired-count=1로 다시 올려 새 이미지로 컨테이너 기동
      - name: Update ECS service with new task definition
        # --task-definition ${{ steps.register.outputs.arn }}
        #  - 새 리비전의 ARN을 서비스에 적용
        #  - 이 서비스는 새 이미지가 포함된 테스크 정의를 사용
        # --desired-count 1
        #  - 테스크 수를 다시 1로 올려 새 이미지로 컨테이너 1개를 작동
        # aws ecs wait services-stable
        #  - 새 컨테이너가 RUNNING 상태가 될 때까지 대기
        #  - 헬스체크 통과까지 포함하여 서비스가 안정화되면 완료
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --task-definition ${{ steps.register.outputs.arn }} \
            --desired-count 1
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }}

      # 8) 배포 실패 시 이전 태스크 정의로 롤백
      # Stop running service 이후 단계에서 실패하면 서비스가 desired-count=0이거나
      # 새 태스크가 계속 죽는 상태로 남을 수 있다.
      # 그래서 배포 전 저장한 이전 task definition ARN으로 서비스를 되돌리고 desired-count=1을 복구한다.
      - name: Rollback to previous task definition on failure
        if: failure()
        env:
          PREVIOUS_TASK_DEFINITION: ${{ steps.current-service.outputs.task-definition }}
        run: |
          if [ -z "$PREVIOUS_TASK_DEFINITION" ] || [ "$PREVIOUS_TASK_DEFINITION" = "None" ]; then
            echo "Previous task definition is missing. Skip rollback."
            exit 1
          fi

          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --task-definition "$PREVIOUS_TASK_DEFINITION" \
            --desired-count 1

          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }}
