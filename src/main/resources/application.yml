spring:
  application:
    name: moduply
  profiles:
    active: local
  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  sql:
    init:
      mode: never
  batch:
    job:
      enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    root: info

cors:
  allowed-origins:
    - "http://moduply.com"

moduply:
  storage:
    type: ${BINARY_CONTENT_STORAGE_TYPE:s3}
    s3:
      access-key: ${AWS_S3_ACCESS_KEY:}
      secret-key: ${AWS_S3_SECRET_KEY:}
      region: ${AWS_S3_REGION}
      bucket: ${AWS_S3_BUCKET}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:600} #기본값:10분
    local:
      root-path: ${LOCAL_STORAGE_ROOT_PATH:./uploads}
      url-prefix: ${LOCAL_STORAGE_URL_PREFIX:/uploads}

jwt:
  key: ${JWT_SECRET_KEY}
  access-token-expiration-minutes: 30
  refresh-token-expiration-minutes: 420
admin:
  init:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}

watching:
  storage:
    type: redis
