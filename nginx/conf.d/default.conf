map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    # HTTP 80 포트는 Let's Encrypt 인증서 발급/갱신과 HTTPS 리다이렉트 용도로 유지한다.
    listen 80;

    # 이 서버 블록이 처리할 운영 도메인이다.
    server_name moduply.co.kr;

    # ECS가 Nginx 컨테이너의 생존 여부를 확인하는 경량 Health Check 엔드포인트다.
    # Spring Boot까지 요청을 전달하지 않고 Nginx가 직접 200 OK를 반환한다.
    location = /nginx-health {
        # 주기적인 Health Check 요청이 액세스 로그를 불필요하게 채우지 않도록 제외한다.
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    # Let's Encrypt가 도메인 소유권을 확인할 때 사용하는 HTTP-01 challenge 경로다.
    # Certbot과 Nginx가 ECS 호스트의 /var/www/certbot 볼륨을 함께 사용해야 한다.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 일반 HTTP 요청은 HTTPS로 전환한다.
    # 단, 위의 Let's Encrypt challenge 경로는 인증서 갱신을 위해 HTTP로 계속 열어둔다.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # HTTPS 요청을 수신한다.
    listen 443 ssl;

    # 이 서버 블록이 처리할 운영 도메인이다.
    server_name moduply.co.kr;

    # Certbot이 EC2 호스트의 /etc/letsencrypt에 발급한 인증서를 사용한다.
    # ECS Task Definition에서 해당 호스트 경로를 Nginx 컨테이너에 읽기 전용으로 마운트해야 한다.
    ssl_certificate /etc/letsencrypt/live/moduply.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moduply.co.kr/privkey.pem;

    # TLS 세션 재사용을 통해 반복 요청의 핸드셰이크 비용을 줄인다.
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 오래된 TLS 프로토콜은 비활성화하고 현재 브라우저가 사용하는 버전만 허용한다.
    ssl_protocols TLSv1.2 TLSv1.3;

    # Nginx 버전 정보 노출을 방지한다.
    server_tokens off;

    # 브라우저가 항상 HTTPS를 사용하도록 강제한다.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ECS가 Nginx 컨테이너의 생존 여부를 확인하는 경량 Health Check 엔드포인트다.
    # Spring Boot까지 요청을 전달하지 않고 Nginx가 직접 200 OK를 반환한다.
    location = /nginx-health {
        # 주기적인 Health Check 요청이 액세스 로그를 불필요하게 채우지 않도록 제외한다.
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    # WebSocket 및 STOMP 연결 요청을 Spring Boot 컨테이너로 전달한다.
    # ECS bridge 모드에서 Nginx 컨테이너에 "moduply-app:app" 링크가 필요하다.
    location /ws {
        proxy_pass http://app:8080;

        # WebSocket 업그레이드는 HTTP/1.1이 필요하다.
        proxy_http_version 1.1;

        # 클라이언트의 HTTP 연결을 WebSocket 연결로 전환하기 위한 헤더다.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Spring Boot가 원래 요청의 도메인, 클라이언트 IP, 프로토콜을 알 수 있도록 전달한다.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # 장시간 유지되는 WebSocket 연결이 기본 프록시 타임아웃으로 끊기지 않도록 한다.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SSE 연결은 장시간 유지되므로 타임아웃을 늘리고 버퍼링을 비활성화한다.
    location /api/sse {
      proxy_pass http://app:8080;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;

      # SSE 연결이 기본 타임아웃(60s)으로 끊기지 않도록 한다.
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;

      # SSE 이벤트가 버퍼링 없이 클라이언트에 즉시 전달되도록 한다.
      proxy_buffering off;
      proxy_cache off;
    }

    # Health Check와 WebSocket 경로를 제외한 모든 HTTPS 요청을 Spring Boot로 전달한다.
    # API 요청뿐 아니라 Spring Boot가 제공하는 SPA 정적 파일 요청도 이 경로를 사용한다.
    location / {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;

        # 리버스 프록시 뒤에서도 애플리케이션이 원본 요청 정보를 사용할 수 있도록 전달한다.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
