server {
    # 인증서 발급 전에는 HTTP 80 포트로 요청을 받는다.
    # 인증서 적용 후에는 이 서버 블록에서 HTTPS로 리다이렉트하도록 변경할 예정이다.
    listen 80;

    # 이 서버 블록이 처리할 운영 도메인이다.
    server_name moduply.co.kr;

    # ECS가 Nginx 컨테이너의 생존 여부를 확인하는 경량 Health Check 엔드포인트다.
    # Spring Boot까지 요청을 전달하지 않고 Nginx가 직접 200 OK를 반환한다.
    location = /nginx-health {
        # 주기적인 Health Check 요청이 액세스 로그를 불필요하게 채우지 않도록 제외한다.
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    # Let's Encrypt가 도메인 소유권을 확인할 때 사용하는 HTTP-01 challenge 경로다.
    # Certbot과 Nginx가 ECS 호스트의 /var/www/certbot 볼륨을 함께 사용해야 한다.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # WebSocket 및 STOMP 연결 요청을 Spring Boot 컨테이너로 전달한다.
    # ECS bridge 모드에서 Nginx 컨테이너에 "moduply-app:app" 링크가 필요하다.
    location /ws {
        proxy_pass http://app:8080;

        # WebSocket 업그레이드는 HTTP/1.1이 필요하다.
        proxy_http_version 1.1;

        # 클라이언트의 HTTP 연결을 WebSocket 연결로 전환하기 위한 헤더다.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Spring Boot가 원래 요청의 도메인, 클라이언트 IP, 프로토콜을 알 수 있도록 전달한다.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 장시간 유지되는 WebSocket 연결이 기본 프록시 타임아웃으로 끊기지 않도록 한다.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Health Check, Certbot, WebSocket 경로를 제외한 모든 HTTP 요청을 Spring Boot로 전달한다.
    # API 요청뿐 아니라 Spring Boot가 제공하는 SPA 정적 파일 요청도 이 경로를 사용한다.
    location / {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;

        # 리버스 프록시 뒤에서도 애플리케이션이 원본 요청 정보를 사용할 수 있도록 전달한다.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
