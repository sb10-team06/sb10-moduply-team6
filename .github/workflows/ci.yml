# =========================================
# .github/workflows/ci.yml
# PR 생성 시 자동으로 테스트 + 커버리지 검증 + Codecov 업로드
#
# 커버리지 기준을 브랜치별로 다르게 적용:
#   - dev로 가는 PR  : 50% (개발 단계, 도메인별로 점진적으로 테스트 추가 중)
#   - main으로 가는 PR : 80% (최종 완성 단계, 전체 도메인 합쳐진 뒤)
# =========================================

name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # -----------------------------------------
      # 핵심: PR의 base 브랜치(target branch)가 무엇인지에 따라
      # coverageMinimum 값을 분기해서 환경변수로 저장
      # - main으로 가는 PR → 0.80
      # - dev로 가는 PR (혹은 dev에 직접 push) → 0.50
      # -----------------------------------------
      - name: Determine coverage threshold by target branch
        id: coverage-threshold
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.base_ref }}" = "main" ]; then
            echo "value=0.80" >> "$GITHUB_OUTPUT"
            echo "👉 main 대상 PR → 커버리지 기준 80%"
          else
            echo "value=0.50" >> "$GITHUB_OUTPUT"
            echo "👉 dev 대상 PR(or push) → 커버리지 기준 50%"
          fi

      # -----------------------------------------
      # 테스트 실행 (jacocoTestReport는 finalizedBy로 자동 실행됨)
      # -----------------------------------------
      - name: Run tests
        run: ./gradlew test

      # -----------------------------------------
      # 위에서 결정된 기준값을 -PcoverageMinimum 으로 주입해서 검증
      # build.gradle에서 이 값을 받아 violationRules의 minimum으로 사용
      # -----------------------------------------
      - name: Verify coverage threshold
        run: ./gradlew jacocoTestCoverageVerification -PcoverageMinimum=${{ steps.coverage-threshold.outputs.value }}

      # -----------------------------------------
      # Codecov에 커버리지 리포트 업로드
      # -----------------------------------------
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          fail_ci_if_error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/test