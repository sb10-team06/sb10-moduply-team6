spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  batch:
    jdbc:
      initialize-schema: always
  mail:
    host: localhost
    port: 1025
    username: test-smtp-user
    password: test-smtp-password
    properties:
      mail:
        smtp:
          auth: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: false
  kafka:
    consumer:
      #   테스트마다 무작위 Group ID를 부여하여 메시지 뺏김 현상 방지
      group-id: moduply-test-group-${random.uuid}
      auto-offset-reset: earliest
    listener:
      auto-startup: false
    #  컨테이너 종료 시 커넥션 대기 시간 최솟값으로 단축
    properties:
      max.block.ms: 1000
      reconnect.backoff.ms: 1000
      reconnect.backoff.max.ms: 2000
  # Lettuce(Redis)가 도커 닫힌 후 재연결 일으키지 않도록 방지
  data:
    redis:
      lettuce:
        shutdown-timeout: 100ms

logging:
  level:
    com.team6.moduply: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

cors:
  allowed-origins:
    - "http://localhost:[*]"
    - "http://127.0.0.1:[*]"

#S3 호출하지 않는 테스트라 region, bucket 기본값만 셋팅
#컨텍스트 로딩 통과용.
moduply:
  storage:
    type: s3
    s3:
      access-key: test-access-key
      secret-key: test-secret-key
      region: ap-northeast-2
      bucket: test-bucket
      presigned-url-expiration: 600
      connect-timeout-millis: 3000
      socket-timeout-millis: 5000
      connection-acquisition-timeout-millis: 3000
      api-call-timeout-millis: 10000
      api-call-attempt-timeout-millis: 5000
      max-retries: 1

  external:
    tmdb:
      read-access-token: test-tmdb-token
    sports-db:
      api-key: test-sports-db-api-key

  content:
    batch:
      import:
        enabled: false
        initial-import-enabled: false

#컨텍스트 로딩 통과용.
jwt:
  key: bW9kdXBseS10ZWFtNi10ZXN0LWVudmlyb25tZW50LWp3dC1zZWNyZXQta2V5LTIwMjYtdmVyeS1zZWN1cmU=
  access-token-expiration-minutes: 30
  refresh-token-expiration-minutes: 420
  oauth-success-url: http://localhost:8080/#/contents
  oauth-failure-url: http://localhost:8080/#/sign-in
admin:
  init:
    email: admin@test.com
    password: test1234
