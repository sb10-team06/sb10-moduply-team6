spring:
  datasource:
    url: ${RDS_URL:${POSTGRES_URL}}
    username: ${RDS_USERNAME:${POSTGRES_USER_NAME}}
    password: ${RDS_PASSWORD:${POSTGRES_PASSWORD}}
    driver-class-name: org.postgresql.Driver
  batch:
    jdbc:
      initialize-schema: never
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGINS}

jwt:
  oauth-success-url: ${OAUTH_SUCCESS_URL:http://localhost:8080/#/contents}
  oauth-failure-url: ${OAUTH_FAILURE_URL:http://localhost:8080/#/sign-in}

logging:
  level:
    com.team6.moduply: info
    org.hibernate.SQL: off
