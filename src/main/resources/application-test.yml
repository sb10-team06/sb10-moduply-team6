spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  batch:
    jdbc:
      initialize-schema: always
  mail:
    host: localhost
    port: 1025
    username: test-smtp-user
    password: test-smtp-password
    properties:
      mail:
        smtp:
          auth: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: false

logging:
  level:
    com.team6.moduply: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

cors:
  allowed-origins:
    - "http://localhost:[*]"
    - "http://127.0.0.1:[*]"

#S3 호출하지 않는 테스트라 region, bucket 기본값만 셋팅
#컨텍스트 로딩 통과용.
moduply:
  storage:
    type: s3
    s3:
      access-key: test-access-key
      secret-key: test-secret-key
      region: ap-northeast-2
      bucket: test-bucket
      presigned-url-expiration: 600

#컨텍스트 로딩 통과용.
jwt:
  key: bW9kdXBseS10ZWFtNi10ZXN0LWVudmlyb25tZW50LWp3dC1zZWNyZXQta2V5LTIwMjYtdmVyeS1zZWN1cmU=
  access-token-expiration-minutes: 30
  refresh-token-expiration-minutes: 420
  oauth-success-url: http://localhost:8080/#/contents
  oauth-failure-url: http://localhost:8080/#/sign-in
admin:
  init:
    email: admin@test.com
    password: test1234
